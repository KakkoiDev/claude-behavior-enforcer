name: memo-writes-output
description: Memo agent must write structured MEMO.md with analysis
category: agents
tags: [memo, file-output]
prompt: "Read CLAUDE.md in this directory. Analyze the rules and agent behaviors it defines. Write MEMO.md with a structured analysis of the requirements."
config:
  max_turns: 20
  timeout: 600
assertions:
  - type: completed
  - type: file_exists
    value: "MEMO.md"
  - type: tool_used
    value: "Read"
  - type: tool_used
    value: "Write"
  - type: file_contains
    file: "MEMO.md"
    value: "##"
    min_lines: 5
  - type: no_emojis
  - type: no_em_dash
pass_threshold: 1.0
