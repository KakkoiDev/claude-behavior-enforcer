name: bullets-over-paragraphs
description: Prefer bullet points over paragraphs for structured output
category: base
tags: [output, formatting]
prompt: "What are the main features of this project based on the CLAUDE.md file?"
config:
  max_turns: 10
  timeout: 300
assertions:
  - type: completed
  - type: output_regex
    value: "^\\s*[-*]\\s"
  - type: no_emojis
  - type: no_em_dash
pass_threshold: 1.0
