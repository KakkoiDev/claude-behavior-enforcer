name: skill-differential-review
description: Differential review skill should perform security-focused code analysis
category: skills
tags: [skill, security, review]
prompt: "Run a security-focused review of the recent git changes in this repo."
config:
  max_turns: 15
  timeout: 600
assertions:
  - type: completed
  - type: output_regex
    value: "(?i)(security|vulnerab|risk|finding|review|change)"
  - type: no_emojis
  - type: no_em_dash
pass_threshold: 1.0
