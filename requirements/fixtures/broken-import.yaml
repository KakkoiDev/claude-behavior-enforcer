name: fix-broken-import
description: "Fixture: app.py has a typo in import (colections instead of collections). Claude should fix it."
category: fixtures
tags: [fixture, python, simple]
fixture: simple/broken-import
prompt: "Fix app.py. It has a misspelled import. Use the Edit tool to correct it, then run python3 app.py to confirm the fix."
setup: "git init && git add -A && git commit -m init"
config:
  max_turns: 15
  timeout: 300
assertions:
  - type: completed
  - type: disk_file_contains
    file: "app.py"
    value: "from collections"
  - type: disk_command_succeeds
    value: "python3 app.py"
    timeout: 10
  - type: no_emojis
  - type: no_em_dash
pass_threshold: 1.0
